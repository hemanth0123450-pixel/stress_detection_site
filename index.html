<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Intelligent Stress Detection System</title>
  <style>
    body { font-family: Arial; background:#0f172a; color:white; text-align:center; padding:20px; }
    button { padding:10px 20px; margin:10px; border:none; border-radius:8px; cursor:pointer; }
    .card { background:#1e293b; padding:20px; border-radius:12px; margin-top:20px; }
    .high { color:#ef4444; }
    .moderate { color:#f59e0b; }
    .low { color:#22c55e; }
  </style>
</head>
<body>
  <h1>Intelligent Stress Detection & Emergency System</h1><button onclick="connectBluetooth()">Connect Smartwatch</button>

  <div class="card">
    <h2>Heart Rate: <span id="hr">--</span></h2>
    <h2>Stress Level: <span id="stress">--</span></h2>
  </div>  <div class="card">
    <h3>Immediate Response</h3>
    <p id="help">Waiting for data...</p>
  </div>  <div class="card">
    <h3>System Status</h3>
    <p id="status">Idle</p>
  </div>  <script>
    let stressStart = null;
    let caretakerResponded = false;

    async function connectBluetooth() {
      try {
        const device = await navigator.bluetooth.requestDevice({
          acceptAllDevices: true,
          optionalServices: ['heart_rate']
        });

        const server = await device.gatt.connect();
        const service = await server.getPrimaryService('heart_rate');
        const characteristic = await service.getCharacteristic('heart_rate_measurement');

        await characteristic.startNotifications();

        characteristic.addEventListener('characteristicvaluechanged', (event) => {
          const value = event.target.value;
          const heartRate = value.getUint8(1);
          document.getElementById('hr').innerText = heartRate;
          detectStress(heartRate);
        });

      } catch (error) {
        alert('Bluetooth connection failed');
      }
    }

    function detectStress(hr) {
      let level = "Low";

      if (hr > 100) level = "High";
      else if (hr > 80) level = "Moderate";

      const stressEl = document.getElementById('stress');
      stressEl.innerText = level;
      stressEl.className = level.toLowerCase();

      // Immediate response always
      showHelp(level);

      if (level === "High") {
        if (!stressStart) stressStart = Date.now();

        let duration = (Date.now() - stressStart) / 1000;
        document.getElementById('status').innerText = `High stress for ${Math.floor(duration)} sec`;

        // 5 min check (300 sec) → for demo use 15 sec
        if (duration > 15) {
          notifyCaretaker();
        }
      } else {
        stressStart = null;
        caretakerResponded = false;
        document.getElementById('status').innerText = "Normal";
      }
    }

    function showHelp(level) {
      let msg = "Stay calm";
      if (level === "High") msg = "Take deep breaths 😮‍💨 | Sit down | Relax";
      else if (level === "Moderate") msg = "Slow breathing | Drink water";
      else msg = "You are fine 😊";

      document.getElementById('help').innerText = msg;
    }

    function notifyCaretaker() {
      document.getElementById('status').innerText = "Notifying caretaker...";

      // simulate response check
      setTimeout(() => {
        if (!caretakerResponded) {
          emergencyMode();
        }
      }, 5000);
    }

    function emergencyMode() {
      document.getElementById('status').innerText = "Emergency Mode Activated!";

      shareLocation();
      autoCall();
      showHelp("High");
    }

    function shareLocation() {
      navigator.geolocation.getCurrentPosition((pos) => {
        const lat = pos.coords.latitude;
        const lon = pos.coords.longitude;
        alert("📍 Location sent: " + lat + ", " + lon);
      });
    }

    function autoCall() {
      alert("📞 Calling emergency contact...");
    }
  </script></body>
</html>
