<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stress Detection System</title>
  <style>
    body { font-family: Arial; background:#0f172a; color:white; text-align:center; padding:20px; }
    button { padding:10px 20px; margin:10px; border:none; border-radius:8px; cursor:pointer; }
    .card { background:#1e293b; padding:20px; border-radius:12px; margin-top:20px; }
    .high { color:#ef4444; }
    .moderate { color:#f59e0b; }
    .low { color:#22c55e; }
  </style>
</head>
<body>
  <h1>Intelligent Stress Detection System</h1>  <!-- REAL MODE --><button onclick="connectBluetooth()">Connect Smartwatch</button>

  <!-- DEMO MODES --><button onclick="scenario1()">Demo: Stress Reduced</button> <button onclick="scenario2()">Demo: Emergency</button>

  <div class="card">
    <h2>Heart Rate: <span id="hr">--</span></h2>
    <h2>Stress Level: <span id="stress">--</span></h2>
  </div>  <div class="card">
    <h3>System Response</h3>
    <p id="help">Waiting for input...</p>
  </div>  <div class="card">
    <h3>Status</h3>
    <p id="status">Idle</p>
  </div>  <script>
    let stressStart = null;

    // ---------------- REAL BLUETOOTH MODE ----------------
    async function connectBluetooth() {
      try {
        const device = await navigator.bluetooth.requestDevice({
          acceptAllDevices: true,
          optionalServices: ['heart_rate']
        });

        const server = await device.gatt.connect();
        const service = await server.getPrimaryService('heart_rate');
        const characteristic = await service.getCharacteristic('heart_rate_measurement');

        await characteristic.startNotifications();

        characteristic.addEventListener('characteristicvaluechanged', (event) => {
          const value = event.target.value;
          const heartRate = value.getUint8(1);
          updateFromRealData(heartRate);
        });

      } catch (error) {
        alert('Bluetooth connection failed');
      }
    }

    function updateFromRealData(hr) {
      detectStress(hr);
    }

    // ---------------- COMMON STRESS LOGIC ----------------
    function detectStress(hr) {
      let level = "Low";

      if (hr > 100) level = "High";
      else if (hr > 80) level = "Moderate";

      const stressEl = document.getElementById('stress');
      stressEl.innerText = level;
      stressEl.className = level.toLowerCase();
      document.getElementById('hr').innerText = hr;

      showHelp(level);

      if (level === "High") {
        if (!stressStart) stressStart = Date.now();

        let duration = (Date.now() - stressStart) / 1000;
        document.getElementById('status').innerText = `High stress for ${Math.floor(duration)} sec`;

        if (duration > 10) {
          emergencyFlow();
        }
      } else {
        stressStart = null;
        document.getElementById('status').innerText = "Normal";
      }
    }

    function showHelp(level) {
      let msg = "Stay calm";
      if (level === "High") msg = "Take deep breaths 😮‍💨 | Relax";
      else if (level === "Moderate") msg = "Slow breathing";
      else msg = "You are fine 😊";

      document.getElementById('help').innerText = msg;
    }

    function emergencyFlow() {
      document.getElementById('status').innerText = "Emergency Mode Activated";
      alert("📍 Location Shared & 📞 Calling Emergency Contact");
    }

    // ---------------- DEMO SCENARIO 1 ----------------
    function scenario1() {
      updateDemo(110, "High", "Take deep breaths 😮‍💨", "High stress detected");

      setTimeout(() => {
        updateDemo(90, "Moderate", "Relaxing...", "Stress reducing");
      }, 4000);

      setTimeout(() => {
        updateDemo(72, "Low", "Calm now 😊", "Normal condition");
      }, 8000);
    }

    // ---------------- DEMO SCENARIO 2 ----------------
    function scenario2() {
      updateDemo(115, "High", "Take deep breaths 😮‍💨", "High stress detected");

      setTimeout(() => {
        updateDemo(118, "High", "Still high...", "Checking duration");
      }, 4000);

      setTimeout(() => {
        updateDemo(120, "High", "Notifying caretaker...", "Alert sent");
      }, 8000);

      setTimeout(() => {
        updateDemo(122, "High", "No response", "Emergency Mode Activated");
        alert("📍 Location Shared & 📞 Calling Emergency Contact");
      }, 12000);
    }

    function updateDemo(hr, level, msg, status) {
      document.getElementById('hr').innerText = hr;
      const stressEl = document.getElementById('stress');
      stressEl.innerText = level;
      stressEl.className = level.toLowerCase();
      document.getElementById('help').innerText = msg;
      document.getElementById('status').innerText = status;
    }
  </script></body>
</html>
