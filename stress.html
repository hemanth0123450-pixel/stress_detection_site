<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stress Detection System</title>
  <style>
    body { font-family: Arial; background:#0f172a; color:white; text-align:center; padding:20px; }
    button { padding:10px 20px; margin:10px; border:none; border-radius:8px; cursor:pointer; }
    .card { background:#1e293b; padding:20px; border-radius:12px; margin-top:20px; }
    .high { color:#ef4444; }
    .moderate { color:#f59e0b; }
    .low { color:#22c55e; }
  </style>
</head>
<body>
  <h1>Intelligent Stress Detection System</h1>  
  
  <button onclick="connectBluetooth()">Connect Smartwatch</button>

  <button onclick="scenario1()">Demo: Stress Reduced</button> 
  <button onclick="scenario2()">Demo: Emergency</button>

  <div class="card">
    <h2>Heart Rate: <span id="hr">--</span></h2>
    <h2>Stress Level: <span id="stress">--</span></h2>
  </div>  
  
  <div class="card">
    <h3>System Response</h3>
    <p id="help">Waiting for input...</p>
  </div>  
  
  <div class="card">
    <h3>Status</h3>
    <p id="status">Idle</p>
  </div>  
  
  <script>
    let stressStart = null;

    // ---------------- REAL BLUETOOTH MODE ----------------
    async function connectBluetooth() {
      try {
        const device = await navigator.bluetooth.requestDevice({
          acceptAllDevices: true,
          optionalServices: ['heart_rate']
        });

        const server = await device.gatt.connect();
        const service = await server.getPrimaryService('heart_rate');
        const characteristic = await service.getCharacteristic('heart_rate_measurement');

        await characteristic.startNotifications();

        characteristic.addEventListener('characteristicvaluechanged', (event) => {
          const value = event.target.value;
          const heartRate = value.getUint8(1);
          updateFromRealData(heartRate);
        });

      } catch (error) {
        alert('Bluetooth connection failed');
      }
    }

    function updateFromRealData(hr) {
      detectStress(hr);
    }

    // ---------------- COMMON STRESS LOGIC ----------------
    function detectStress(hr) {
      let level = "Low";

      if (hr > 100) level = "High";
      else if (hr > 80) level = "Moderate";

      const stressEl = document.getElementById('stress');
      stressEl.innerText = level;
      stressEl.className = level.toLowerCase();
      document.getElementById('hr').innerText = hr;

      showHelp(level);

      if (level === "High") {
        if (!stressStart) stressStart = Date.now();

        let duration = (Date.now() - stressStart) / 1000;
        document.getElementById('status').innerText = `High stress for ${Math.floor(duration)} sec`;

        if (duration > 10) {
          emergencyFlow();
        }
      } else {
        stressStart = null;
        document.getElementById('status').innerText = "Normal";
      }
    }

    function showHelp(level) {
      let msg = "Stay calm";

      if (level === "High") {
        msg = "⚠️ High Stress Detected\n\n" +
              "• Sit down in a comfortable position\n" +
              "• Try the 4-7-8 method: Inhale for 4s, hold for 7s, exhale for 8s 😮‍💨\n" +
              "• Close your eyes and relax your shoulders\n" +
              "• Drink some water slowly 💧\n" +
              "• Name 3 things you can see around you to ground yourself\n" +
              "• If possible, move to a quiet place";
      } 
      else if (level === "Moderate") {
        msg = "⚠️ Moderate Stress\n\n" +
              "• Slow down your breathing\n" +
              "• Take a short break from your current activity\n" +
              "• Stretch your neck and arms gently\n" +
              "• Drink water 💧\n" +
              "• Try to relax your mind";
      } 
      else {
        msg = "✅ Normal Condition\n\n" +
              "• You are doing fine 😊\n" +
              "• Maintain steady breathing\n" +
              "• Stay hydrated\n" +
              "• Continue your activity calmly";
      }

      document.getElementById('help').innerText = msg;
    }

    function emergencyFlow() {
      document.getElementById('status').innerText = "Emergency Mode Activated";
      alert("📍 Location Shared & 📞 Calling Emergency Contact");
    }

    // ---------------- DEMO SCENARIO 1 ----------------
    function scenario1() {
      updateDemo(110, "High", 
        "⚠️ High Stress Detected\n\n" +
        "• Please stop what you are doing and sit down immediately.\n" +
        "• Take slow, deep breaths: Inhale for 4 seconds, exhale for 6 seconds 😮‍💨\n" +
        "• Relax your shoulders and unclench your jaw.\n" +
        "• Focus your eyes on a single stationary object.", 
        "High stress detected");

      setTimeout(() => {
        updateDemo(90, "Moderate", 
          "⚠️ Moderate Stress\n\n" +
          "• Good job, your heart rate is lowering.\n" +
          "• Continue your deep breathing exercises.\n" +
          "• Slowly roll your shoulders to release tension.\n" +
          "• Take a sip of water if you have some nearby 💧.", 
          "Stress reducing");
      }, 4000);

      setTimeout(() => {
        updateDemo(72, "Low", 
          "✅ Normal Condition\n\n" +
          "• Excellent! You have successfully calmed down 😊\n" +
          "• Your vitals are back in the normal range.\n" +
          "• Take a moment to rest before standing up.\n" +
          "• You may resume your activities safely.", 
          "Normal condition");
      }, 8000);
    }

    // ---------------- DEMO SCENARIO 2 ----------------
    function scenario2() {
      updateDemo(115, "High", 
        "⚠️ Critical Stress Spike\n\n" +
        "• Sit down immediately.\n" +
        "• Breathe in deeply through your nose, out through your mouth 😮‍💨\n" +
        "• Try to stay as still as possible.\n" +
        "• We are monitoring your vitals closely.", 
        "High stress detected");

      setTimeout(() => {
        updateDemo(118, "High", 
          "⚠️ Stress Levels Remaining High\n\n" +
          "• Keep focusing on your breath.\n" +
          "• Do not attempt to stand up or walk.\n" +
          "• Place your hand over your heart and feel the rhythm slow down.\n" +
          "• Preparing to alert your emergency contacts if this continues.", 
          "Checking duration");
      }, 4000);

      setTimeout(() => {
        updateDemo(120, "High", 
          "⚠️ Alert Protocol Initiated\n\n" +
          "• Please remain seated.\n" +
          "• We are actively notifying your caretaker.\n" +
          "• Keep breathing slowly and steadily.\n" +
          "• Help is standing by.", 
          "Alert sent");
      }, 8000);

      setTimeout(() => {
        updateDemo(122, "High", 
          "🚨 Emergency Assistance Required\n\n" +
          "• Your location has been shared.\n" +
          "• Your emergency contact is being called.\n" +
          "• Please stay exactly where you are.", 
          "Emergency Mode Activated");
        alert("📍 Location Shared & 📞 Calling Emergency Contact");
      }, 12000);
    }

    function updateDemo(hr, level, msg, status) {
      document.getElementById('hr').innerText = hr;
      const stressEl = document.getElementById('stress');
      stressEl.innerText = level;
      stressEl.className = level.toLowerCase();
      document.getElementById('help').innerText = msg;
      document.getElementById('status').innerText = status;
    }
  </script>
</body>
</html>
